services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ballot
      POSTGRES_PASSWORD: ballot
      POSTGRES_DB: ballot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ballot -d ballot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ballot_pg_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  ballot_pg_data:
